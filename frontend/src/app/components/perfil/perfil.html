<div *ngIf="userData$ | async as data" class="perfil-container">
  <div class="user-card">
    <img [src]="data['foto']" alt="Foto">
    <h2>Bienvenido, {{ data['nombre'] }}</h2>
    <p>{{ data['email'] }}</p>
  </div>

  <hr>

  <div class="form-container">
    <h3>Registrar Nuevo Videojuego</h3>
    <form [formGroup]="videojuegoForm" (ngSubmit)="guardarVideojuego()">
      
      <div class="form-group">
        <label>Título del Juego:</label>
        <input type="text" formControlName="titulo" placeholder="Ej. Elden Ring">
      </div>

      <div class="form-group">
        <label>Año de Lanzamiento:</label>
        <input type="number" formControlName="anio" placeholder="Ej. 2022">
      </div>

      <div class="form-group">
        <label>Género:</label>
        <select formControlName="genero">
          <option value="">Selecciona uno...</option>
          <option value="1">Acción</option>
          <option value="2">RPG</option>
          <option value="3">Deportes</option>
        </select>
      </div>

      <button type="submit" [disabled]="videojuegoForm.invalid">Guardar Videojuego</button>
    </form>
  </div>

  <button class="btn-logout" (click)="authService.logout()">Cerrar Sesión</button>
</div>
