<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h3 class="mb-0">Registrar Videojuego</h3>
        </div>
        <div class="card-body">
            <form [formGroup]="form" (ngSubmit)="guardarVideojuego()">
                <div class="mb-3">
                    <label class="form-label">Título del Juego</label>
                    <input type="text" formControlName="titulo" class="form-control" placeholder="Ej: Halo Infinite">
                </div>

                <div class="mb-3">
                    <label class="form-label">Año de Lanzamiento</label>
                    <input type="number" formControlName="anio" class="form-control" placeholder="Ej: 2021">
                </div>

                <div class="mb-3">
                    <label class="form-label">Género</label>
                    <select formControlName="genero" class="form-select">
                        <option value="" disabled selected>Selecciona un género</option>
                        <option value="1">Acción</option>
                        <option value="2">RPG</option>
                        <option value="3">Deportes</option>
                    </select>
                </div>

                <div class="d-grid">
                    <button type="submit" [disabled]="form.invalid || loading" class="btn btn-success">
                        <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
                        {{ loading ? 'Guardando...' : 'Guardar en Base de Datos SQL' }}
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
